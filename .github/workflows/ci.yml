name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.specs/**'
      - '.gitignore'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.specs/**'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: Typecheck + bun test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        run: bunx tsc --noEmit

      - name: Run unit tests
        run: bun test
